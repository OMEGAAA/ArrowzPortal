<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMEWORK | ARROWZ栃木ポータルサイト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>
    <div id="common-header"></div>

    <main>
        <section class="section">
            <div class="container">
                <h2 class="section-title" data-text="宿題動画">宿題動画</h2>

                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all">ALL</button>
                    <button class="filter-btn" data-filter="basic">BASIC (基礎)</button>
                    <button class="filter-btn" data-filter="applied">APPLIED (応用)</button>
                    <button class="filter-btn" data-filter="jump">JUMP (跳躍力)</button>
                    <button class="filter-btn" data-filter="speed">SPEED (瞬発力)</button>
                </div>

                <div class="video-grid" id="video-grid-container">
                    <!-- Videos rendered dynamically -->
                </div>
            </div>
        </section>
    </main>

    <div id="common-footer"></div>

    <script src="js/layout.js"></script>
    <script src="js/homework_data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const videoGrid = document.getElementById('video-grid-container');
            const filterBtns = document.querySelectorAll('.filter-btn');

            let currentFilter = 'all';

            function renderVideos() {
                if (!window.HOMEWORK_DATA || !videoGrid) return;
                
                videoGrid.innerHTML = '';
                
                window.HOMEWORK_DATA.forEach(video => {
                    const category = video.category || '';
                    
                    if (currentFilter !== 'all' && !category.includes(currentFilter)) {
                        return;
                    }

                    let ytId = '';
                    const url = video.url || '';
                    if (url.includes('youtu.be/')) {
                        ytId = url.split('youtu.be/')[1].split('?')[0];
                    } else if (url.includes('v=')) {
                        ytId = url.split('v=')[1].split('&')[0];
                    } else if (url.includes('embed/')) {
                        ytId = url.split('embed/')[1].split('?')[0];
                    }

                    const thumbUrl = ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : 'images/news_default.png';

                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.setAttribute('data-category', category);
                    card.style.opacity = '0';
                    card.onclick = () => window.open(url, '_blank');

                    const cats = category.toUpperCase().split(' ');
                    const mainCat = cats[0] || '';
                    const subCat = cats[1] || '';
                    const displayCategory = mainCat && subCat ? `${mainCat} / ${subCat}` : mainCat;

                    card.innerHTML = `
                        <div class="video-thumbnail" style="background-image: url('${thumbUrl}'); background-size: cover; background-position: center;">
                            <div class="play-icon">▶</div>
                        </div>
                        <div class="video-info">
                            <span class="video-category">${displayCategory}</span>
                            <h3 class="video-title">${video.title}</h3>
                            <p class="video-desc">${video.desc || ''}</p>
                        </div>
                    `;

                    videoGrid.appendChild(card);
                    setTimeout(() => card.style.opacity = '1', 50);
                });
            }

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.getAttribute('data-filter');
                    renderVideos();
                });
            });

            renderVideos();
        });
    </script>
</body>

</html>
