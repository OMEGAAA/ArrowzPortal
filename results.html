<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FT RESULTS | ARROWZ栃木ポータルサイト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>

    <div id="common-header"></div>

    <main>
        <!-- Section 1: This Month's Results -->
        <section class="section">
            <div class="container">
                <h2 class="section-title" data-text="今月の結果">今月の結果</h2>
                <div class="result-summary-card">
                    <div class="summary-header">
                        <span class="summary-date" id="res-date">—</span>
                        <span class="summary-label">COMMENT</span>
                    </div>
                    <div class="summary-body">
                        <p class="summary-comment" id="res-comment" style="font-size: 1.2rem; line-height: 1.6; margin-bottom: 1rem;">
                            今月の要約コメント
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section 2: Personal Data -->
        <section class="section">
            <div class="container">
                <h2 class="section-title" data-text="個人データ">個人データ</h2>
                <div class="result-personal-wrapper">
                    <div class="personal-data-card">
                        <div class="login-prompt">
                            <p>個人の詳細データを確認するにはログインしてください。</p>
                            <a href="" id="res-login-link"
                                class="btn-primary" style="text-decoration: none; display: inline-block;">LOGIN / MY PAGE
                                <span class="arrow">→</span></a>
                        </div>
                        <div class="data-viz-bg"></div>
                    </div>
                    <div class="personal-data-image-container">
                        <img src="images/ft_summary_img.png" alt="フィールドテスト結果まとめ" class="summary-img" id="res-summary-img">
                        <p class="summary-caption" id="res-img-caption">フィールドテスト結果まとめ</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section 3: Ranking Table -->
        <section class="section">
            <div class="container">
                <h2 class="section-title" data-text="ランキング">ランキング表</h2>
                <div class="ranking-wrapper">
                    <table class="ranking-table">
                        <thead>
                            <tr>
                                <th>RANK</th>
                                <th>NAME</th>
                                <th>CLASS</th>
                                <th>最高速度</th>
                            </tr>
                        </thead>
                        <tbody id="res-ranking-body"></tbody>
                    </table>
                </div>
                <div class="ranking-footer" style="text-align: center; margin-top: 2rem;">
                    <a href="ranking.html" class="btn-primary"
                        style="text-decoration: none; display: inline-block;">VIEW FULL RANKING <span
                            class="arrow">→</span></a>
                </div>
            </div>
        </section>
    </main>

    <div id="common-footer"></div>

    <script src="js/layout.js"></script>
    <script src="js/ranking_data.js"></script>
    <script src="js/results_data.js"></script>
    <script src="js/main.js"></script>
    <script>
        (function () {
            // Apply Results Data dynamically
            if (window.RESULTS_DATA) {
                const resData = window.RESULTS_DATA;
                
                const commentEl = document.getElementById('res-comment');
                if (commentEl && resData.comment) {
                    commentEl.textContent = resData.comment;
                }

                const loginLinkEl = document.getElementById('res-login-link');
                if (loginLinkEl && resData.loginLink) {
                    loginLinkEl.href = resData.loginLink;
                }

                const summaryImgEl = document.getElementById('res-summary-img');
                if (summaryImgEl) {
                    summaryImgEl.src = resData.imageData || resData.summaryImg || 'images/ft_summary_img.png';
                }

                const imgCaptionEl = document.getElementById('res-img-caption');
                if (imgCaptionEl && resData.imgCaption) {
                    imgCaptionEl.textContent = resData.imgCaption;
                }
            }

            if (!window.RANKING_DATA) return;

            const sorted = [...window.RANKING_DATA].sort((a, b) => {
                const valA = (a.scores && a.scores.vmax) || 0;
                const valB = (b.scores && b.scores.vmax) || 0;
                return valB - valA;
            });

            const dateEl = document.getElementById('res-date');

            let resultDate = new Date();
            resultDate.setMonth(2); // Force to March (0-indexed)

            if (sorted.length > 0 && sorted[0].test_date) {
                const d = new Date(sorted[0].test_date);
                if (!isNaN(d.getTime())) {
                    resultDate = d;
                }
            }

            if (dateEl) {
                dateEl.textContent = resultDate.getFullYear() + '.' + String(resultDate.getMonth() + 1).padStart(2, '0');
            }
            const tbody = document.getElementById('res-ranking-body');
            if (tbody) {
                sorted.forEach((d, i) => {
                    const tr = document.createElement('tr');
                    if (i < 3) tr.className = 'rank-' + (i + 1);
                    const scoreVal = (d.scores && d.scores.vmax) || 0;
                    tr.innerHTML = `<td class="rank-num">${String(i + 1).padStart(2, '0')}</td><td class="rank-name">${d.name}</td><td>${d.class || d.category || ''}</td><td class="rank-score">${scoreVal.toFixed(1)}</td>`;
                    tbody.appendChild(tr);
                });
            }
        })();
    </script>
</body>

</html>
