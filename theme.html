<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTHLY THEME | ARROWZ栃木ポータルサイト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .theme-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            margin-top: 2rem;
        }

        .theme-image {
            width: 100%;
            height: 400px;
            background-color: #1a1a1a;
            border: 1px solid var(--accent-color);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .theme-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent 40%, rgba(204, 255, 0, 0.1) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                background-position: 200% 50%;
            }

            100% {
                background-position: -200% 50%;
            }
        }

        .theme-text h3 {
            font-family: var(--font-primary);
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 1rem;
        }

        .theme-text p {
            font-family: var(--font-secondary);
            line-height: 1.8;
            color: var(--text-color);
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .point-list {
            list-style: none;
            padding: 0;
        }

        .point-list li {
            margin-bottom: 0.5rem;
            padding-left: 1.5rem;
            position: relative;
            font-family: var(--font-secondary);
        }

        .point-list li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: var(--accent-color);
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .theme-content {
                grid-template-columns: 1fr;
            }

            .theme-image {
                height: 300px;
            }
        }
    </style>
</head>

<body>

    <div id="common-header"></div>

    <main>
        <section class="section">
            <div class="container">
                <h2 class="section-title" data-text="THEME">MONTHLY THEME</h2>
                <div class="theme-content">
                    <div class="theme-image">
                        <svg viewBox="0 0 24 24" width="100" height="100" stroke="currentColor" stroke-width="0.5"
                            fill="none" class="icon-svg" style="color: var(--accent-color);">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <div class="theme-text">
                        <h3>START DASH</h3>
                        <p><strong>「スタートダッシュ」</strong><br>
                            5月のテーマは、スタートダッシュの改善を図るためのトレーニングです。</p>
                        <p>前に進む力を身に着けるために大切なポイントを確認しましょう。
                        </p>

                        <ul class="point-list">
                            <li>ヒップヒンジやドロップスクワットなど基礎的なトレーニング</li>
                            <li>足の引き上げの改善</li>
                            <li>トリプルエクステンションの獲得</li>
                            <li>体幹の安定</li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="common-footer"></div>

    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
